name: Update Redraft ADP Daily

on:
  schedule:
    - cron: "31 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: redraft-adp-daily
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run the same ADP updater used locally
        run: bash scripts/adp_update.sh

      - name: Commit & push if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/data/adp.csv src/data/rankings.ts
          git commit -m "Update redraft ADP"
          git push
