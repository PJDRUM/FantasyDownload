name: Update KTC Rankings Daily

on:
  schedule:
    - cron: "15 6 * * *"   # daily (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 tqdm

      - name: Run scraper
        run: |
          python scripts/ktc_scrape.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/rankings.csv
          git diff --staged --quiet || git commit -m "Update KTC rankings"
          git push