name: Update Consensus Rankings Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "10 21 * * *"

permissions:
  contents: write

jobs:
  update-consensus:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Consensus updater
        run: bash scripts/consensus_update.sh

      - name: Commit updated consensus files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/consensus.csv src/data/rankings.ts
          git diff --cached --quiet || git commit -m "Update consensus rankings"
          git push
